# Auto-deploy to Firebase Hosting when a commit lands on main.
# Requires GitHub secret: FIREBASE_SERVICE_ACCOUNT_MEDIVOY_1FF3B (JSON from Firebase Console → Project settings → Service accounts → Generate new private key)

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEDIVOY_1FF3B }}
          channelId: live
          projectId: medivoy-1ff3b
